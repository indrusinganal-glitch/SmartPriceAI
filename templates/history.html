{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} - Price History</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
    <h2>SmartPrice AI</h2>

    <div>
        <a href="/dashboard/">Dashboard</a>
        <a href="/wishlist/">Wishlist</a>
        <a href="/profile/">Profile</a>
        <a href="/logout/">Logout</a>
    </div>
</nav>

<section class="product-details">

    <img src="{{ product.image.url }}" width="300">

    <h1>{{ product.name }}</h1>

    <h3>{{ product.brand }}</h3>

    <h2>Current Price : ₹{{ product.price }}</h2>

    <p>{{ product.description }}</p>

</section>

<section style="width:80%; margin:40px auto;">

    <h2 style="text-align:center;">Price History</h2>

    <canvas id="priceChart"></canvas>

</section>

<div style="text-align:center; margin-bottom:40px;">

    <a href="/products/{{ product.id }}/">
        <button>Back to Product</button>
    </a>

    <a href="/dashboard/">
        <button>Dashboard</button>
    </a>

</div>

<script>

const ctx = document.getElementById('priceChart');

new Chart(ctx, {

    type: 'line',

    data: {

        labels: ['January','February','March','April','May','June'],

        datasets: [{

            label: 'Product Price (₹)',

            data: [

                {{ product.price|add:"1500" }},

                {{ product.price|add:"1200" }},

                {{ product.price|add:"900" }},

                {{ product.price|add:"600" }},

                {{ product.price|add:"300" }},

                {{ product.price }}

            ],

            borderWidth:3,

            fill:false,

            tension:0.4

        }]

    },

    options:{

        responsive:true,

        plugins:{
            legend:{
                display:true
            }
        },

        scales:{

            y:{
                beginAtZero:false
            }

        }

    }

});

</script>

</body>
</html>
